<!DOCTYPE html>
<html lang="ja" style="background:#000;">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>古びた部屋 | pix.npaso.com</title>
    <meta name="description" content="机の上の古い手紙と手帳を、差し込む光が照らす部屋" />
    <link rel="canonical" href="https://pix.npaso.com/items/eve-20260407-165457/" />

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: Inter, "Noto Sans JP", system-ui, -apple-system, sans-serif;
        }

        body {
            overflow: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .viewer-back {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 30;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 92px;
            height: 48px;
            padding: 0 16px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.02em;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.42);
            transition: opacity 0.28s ease, background-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
            opacity: 0;
            pointer-events: none;
        }

        .viewer-back.is-visible {
            opacity: 0.86;
            pointer-events: auto;
        }

        .viewer-back.is-dimmed {
            opacity: 0;
            pointer-events: none;
        }

        .viewer-back:hover {
            background: rgba(0, 0, 0, 0.84);
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5);
        }

        .viewer-stage {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            touch-action: none;
            user-select: none;
            cursor: default;
        }

        .viewer-stage.is-zoomed {
            cursor: grab;
        }

        .viewer-stage.is-dragging {
            cursor: grabbing;
        }

        .viewer-image {
            display: block;
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            transform-origin: center center;
            transform: translate3d(0px, 0px, 0) scale(1);
            will-change: transform;
            user-select: none;
            -webkit-user-drag: none;
        }

        .viewer-meta {
            position: fixed;
            left: 18px;
            right: 18px;
            bottom: 18px;
            z-index: 25;
            max-width: min(760px, calc(100vw - 36px));
            padding: 16px 18px;
            border-radius: 24px;
            background: transparent;
            border: 0;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            box-shadow: none;
            transition: opacity 0.28s ease, transform 0.28s ease;
            opacity: 0;
            pointer-events: none;
        }

        .viewer-meta.is-visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .viewer-meta.is-dimmed {
            opacity: 0;
            transform: translateY(4px);
            pointer-events: none;
        }

        .viewer-meta__title {
            margin: 0 0 8px;
            font-size: clamp(1.05rem, 2vw, 1.28rem);
            line-height: 1.3;
        }

        .viewer-meta__description {
            margin: 0;
            color: rgba(255, 255, 255, 0.84);
            font-size: 0.96rem;
            line-height: 1.65;
        }

        .viewer-meta__tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .viewer-meta__tag {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.88);
            font-size: 0.82rem;
        }

        @media (max-width: 640px) {
            .viewer-back {
                min-width: 70px;
                height: 42px;
                font-size: 14px;
            }

            .viewer-meta {
                left: 12px;
                right: 12px;
                bottom: 12px;
                padding: 14px 14px;
                border-radius: 20px;
            }

            .viewer-meta__description {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <a class="viewer-back" href="../../index.html" aria-label="一覧へ戻る">←</a>

    <main class="viewer-stage" id="viewerStage" aria-label="画像ビューア">
        <img class="viewer-image" id="viewerImage" src="https://img.npaso.com/viewer/eve-20260407-165457.webp" alt="机の上の古い手紙と手帳を、差し込む光が照らす部屋" loading="eager"
            draggable="false" />
    </main>

    <aside class="viewer-meta" id="viewerMeta" aria-label="作品情報">
        <h1 class="viewer-meta__title">古びた部屋</h1>
        <p class="viewer-meta__description">机の上の古い手紙と手帳を、差し込む光が照らす部屋</p>
    </aside>

    <script>
        (() => {
            const container = document.getElementById("viewerStage");
            const image = document.getElementById("viewerImage");
            const backButton = document.querySelector(".viewer-back");
            const metaPanel = document.getElementById("viewerMeta");

            let scale = 1;
            let translateX = 0;
            let translateY = 0;

            const MIN_SCALE = 1;
            const MAX_SCALE = 6;
            const SCALE_STEP = 0.2;

            let isDragging = false;
            let dragStartX = 0;
            let dragStartY = 0;
            let dragOriginX = 0;
            let dragOriginY = 0;

            let hideTimer = null;

            function clamp(value, min, max) {
                return Math.min(max, Math.max(min, value));
            }

            function applyTransform() {
                image.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scale})`;
                container.classList.toggle("is-zoomed", scale > 1);
            }

            function resetView() {
                scale = 1;
                translateX = 0;
                translateY = 0;
                applyTransform();
            }

            function zoomAt(clientX, clientY, nextScale) {
                const rect = container.getBoundingClientRect();
                const cx = clientX - rect.left - rect.width / 2;
                const cy = clientY - rect.top - rect.height / 2;

                const prevScale = scale;
                scale = clamp(nextScale, MIN_SCALE, MAX_SCALE);

                if (scale === prevScale) {
                    return;
                }

                const ratio = scale / prevScale;
                translateX = cx - (cx - translateX) * ratio;
                translateY = cy - (cy - translateY) * ratio;

                if (scale === 1) {
                    translateX = 0;
                    translateY = 0;
                }

                applyTransform();
            }

            function showOverlay() {
                backButton.classList.add("is-visible");
                backButton.classList.remove("is-dimmed");
                metaPanel.classList.add("is-visible");
                metaPanel.classList.remove("is-dimmed");

                clearTimeout(hideTimer);
                hideTimer = setTimeout(() => {
                    backButton.classList.remove("is-visible");
                    backButton.classList.add("is-dimmed");
                    metaPanel.classList.remove("is-visible");
                    metaPanel.classList.add("is-dimmed");
                }, 1800);
            }

            container.addEventListener("wheel", (event) => {
                event.preventDefault();
                const delta = event.deltaY < 0 ? SCALE_STEP : -SCALE_STEP;
                zoomAt(event.clientX, event.clientY, scale + delta);
                showOverlay();
            }, { passive: false });

            window.addEventListener("keydown", (event) => {
                const key = event.key;

                if (key === "+" || key === "=") {
                    event.preventDefault();
                    zoomAt(window.innerWidth / 2, window.innerHeight / 2, scale + SCALE_STEP);
                } else if (key === "-") {
                    event.preventDefault();
                    zoomAt(window.innerWidth / 2, window.innerHeight / 2, scale - SCALE_STEP);
                } else if (key === "0") {
                    event.preventDefault();
                    resetView();
                } else if (key === "Escape") {
                    event.preventDefault();
                    if (document.referrer && new URL(document.referrer).origin === location.origin) {
                        history.back();
                    } else {
                        window.location.href = "../../index.html";
                    }
                }

                showOverlay();
            });

            container.addEventListener("pointerdown", (event) => {
                if (scale <= 1) {
                    showOverlay();
                    return;
                }

                isDragging = true;
                dragStartX = event.clientX;
                dragStartY = event.clientY;
                dragOriginX = translateX;
                dragOriginY = translateY;
                container.classList.add("is-dragging");
                container.setPointerCapture(event.pointerId);
                showOverlay();
            });

            container.addEventListener("pointermove", (event) => {
                if (!isDragging) {
                    return;
                }

                translateX = dragOriginX + (event.clientX - dragStartX);
                translateY = dragOriginY + (event.clientY - dragStartY);
                applyTransform();
            });

            function endDrag(event) {
                if (!isDragging) {
                    return;
                }

                isDragging = false;
                container.classList.remove("is-dragging");

                try {
                    container.releasePointerCapture(event.pointerId);
                } catch (_) { }
            }

            container.addEventListener("pointerup", endDrag);
            container.addEventListener("pointercancel", endDrag);

            container.addEventListener("dblclick", (event) => {
                if (scale > 1) {
                    resetView();
                } else {
                    zoomAt(event.clientX, event.clientY, 2);
                }
                showOverlay();
            });

            ["mousemove", "mousedown", "touchstart", "wheel", "click"].forEach((eventName) => {
                window.addEventListener(eventName, showOverlay, { passive: true });
            });

            if (image.complete) {
                resetView();
            } else {
                image.addEventListener("load", resetView, { once: true });
            }

            window.addEventListener("resize", () => {
                resetView();
                showOverlay();
            });

            showOverlay();
        })();
    </script>
</body>

</html>
