<!DOCTYPE html>
<html lang="ja" style="background:#000;">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>__PAGE_TITLE__</title>
    <meta name="description" content="__META_DESCRIPTION__" />
    <link rel="canonical" href="https://pix.npaso.com/items/__ITEM_ID__/" />

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: Inter, "Noto Sans JP", system-ui, -apple-system, sans-serif;
        }

        body {
            overflow: hidden;
        }

        a,
        button {
            color: inherit;
            text-decoration: none;
            font: inherit;
        }

        .viewer-back {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 30;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 92px;
            height: 48px;
            padding: 0 16px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.02em;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.42);
            transition: opacity 0.28s ease, background-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
            opacity: 0;
            pointer-events: none;
        }

        .viewer-back.is-visible {
            opacity: 0.86;
            pointer-events: auto;
        }

        .viewer-back.is-dimmed {
            opacity: 0;
            pointer-events: none;
        }

        body.is-gesture-active .viewer-back,
        body.is-gesture-active .viewer-meta {
            pointer-events: none !important;
        }

        .viewer-back:hover {
            background: rgba(0, 0, 0, 0.84);
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5);
        }

        .viewer-stage {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            touch-action: none;
            user-select: none;
            cursor: default;
        }

        .viewer-stage.is-zoomed {
            cursor: grab;
        }

        .viewer-stage.is-dragging {
            cursor: grabbing;
        }

        .viewer-image {
            display: block;
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            transform-origin: center center;
            transform: translate3d(0px, 0px, 0) scale(1);
            will-change: transform;
            user-select: none;
            -webkit-user-drag: none;
        }

        .viewer-meta {
            position: fixed;
            left: 18px;
            right: 18px;
            bottom: 18px;
            z-index: 25;
            max-width: min(760px, calc(100vw - 36px));
            padding: 16px 18px;
            border-radius: 24px;
            background: transparent;
            border: 0;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            box-shadow: none;
            transition: opacity 0.28s ease, transform 0.28s ease;
            opacity: 0;
            pointer-events: none;
        }

        .viewer-meta.is-visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .viewer-meta.is-dimmed {
            opacity: 0;
            transform: translateY(4px);
            pointer-events: none;
        }

        .viewer-meta__title {
            margin: 0 0 8px;
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(0.92rem, 1.4vw, 1.02rem);
            font-weight: 500;
            line-height: 1.45;
            letter-spacing: 0.01em;
        }

        .viewer-meta__description {
            margin: 0;
            color: rgba(255, 255, 255, 0.84);
            font-size: 0.96rem;
            line-height: 1.65;
        }

        .viewer-meta__actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .viewer-download {
            display: none;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 0 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.87rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: background-color 0.18s ease, border-color 0.18s ease, transform 0.18s ease, opacity 0.18s ease;
            cursor: pointer;
        }

        .viewer-download.is-available {
            display: inline-flex;
        }

        .viewer-download:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.26);
            transform: translateY(-1px);
        }

        .viewer-download:active {
            transform: translateY(0);
        }

        .viewer-download.is-busy {
            opacity: 0.72;
            cursor: progress;
        }

        .viewer-download.is-disabled {
            opacity: 0.5;
            cursor: default;
        }

        .viewer-download-note {
            display: none;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .viewer-download-note.is-visible {
            display: block;
        }

        .viewer-meta__tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .viewer-meta__tag {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.88);
            font-size: 0.82rem;
        }

        @media (max-width: 640px) {
            .viewer-back {
                min-width: 70px;
                height: 42px;
                font-size: 14px;
            }

            .viewer-meta {
                left: 12px;
                right: 12px;
                bottom: 12px;
                padding: 14px 14px;
                border-radius: 20px;
            }

            .viewer-meta__description {
                font-size: 0.9rem;
            }

            .viewer-download {
                min-height: 36px;
                padding: 0 12px;
                font-size: 0.84rem;
            }

            .viewer-download-note {
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <a class="viewer-back" href="../../index.html" aria-label="一覧へ戻る">←</a>

    <main class="viewer-stage" id="viewerStage" aria-label="画像ビューア">
        <img class="viewer-image" id="viewerImage" src="__VIEWER_IMAGE_URL__" alt="__IMAGE_ALT__" loading="eager"
            draggable="false" />
    </main>

    <aside class="viewer-meta" id="viewerMeta" aria-label="作品情報">
        <h1 class="viewer-meta__title">__TITLE__</h1>
        <p class="viewer-meta__description">__DISPLAY_DESCRIPTION__</p>

        <div class="viewer-meta__actions">
            <button class="viewer-download" id="viewerDownload" type="button" data-download-url="__DOWNLOAD_IMAGE_URL__"
                data-download-filename="__ITEM_ID__.webp" aria-label="高解像度 Download">高解像度 Download</button>
        </div>

        <p class="viewer-download-note" id="viewerDownloadNote" aria-live="polite"></p>
    </aside>

    <script>
        (() => {
            const container = document.getElementById("viewerStage");
            const image = document.getElementById("viewerImage");
            const backButton = document.querySelector(".viewer-back");
            const metaPanel = document.getElementById("viewerMeta");
            const downloadButton = document.getElementById("viewerDownload");

            const MIN_SCALE = 1;
            const MAX_SCALE = 6;
            const SCALE_STEP = 0.2;
            const OVERLAY_HIDE_DELAY = 2600;
            const RESIZE_SETTLE_DELAY = 180;
            const PAN_SAFE_GUTTER_X = 0;

            let scale = 1;
            let translateX = 0;
            let translateY = 0;

            let isMouseDragging = false;
            let gestureMode = "none";
            let dragPointerId = null;
            let pinchStartDistance = 0;
            let pinchStartScale = 1;
            let pinchStartTranslateX = 0;
            let pinchStartTranslateY = 0;
            let pinchStartMidX = 0;
            let pinchStartMidY = 0;

            let hideTimer = null;
            let resizeTimer = null;
            let pendingViewportReflow = false;
            let isDownloadAvailable = false;
            let isDownloading = false;

            const activePointers = new Map();

            function clamp(value, min, max) {
                return Math.min(max, Math.max(min, value));
            }

            function getContainerRect() {
                return container.getBoundingClientRect();
            }

            function getPointFromClient(clientX, clientY) {
                const rect = getContainerRect();
                return {
                    x: clientX - rect.left - rect.width / 2,
                    y: clientY - rect.top - rect.height / 2
                };
            }

            function getDisplayedImageSize() {
                const rect = getContainerRect();
                const naturalWidth = image.naturalWidth || image.width || rect.width;
                const naturalHeight = image.naturalHeight || image.height || rect.height;

                if (!naturalWidth || !naturalHeight) {
                    return { width: rect.width, height: rect.height };
                }

                const imageRatio = naturalWidth / naturalHeight;
                const containerRatio = rect.width / rect.height;

                if (imageRatio > containerRatio) {
                    return {
                        width: rect.width,
                        height: rect.width / imageRatio
                    };
                }

                return {
                    width: rect.height * imageRatio,
                    height: rect.height
                };
            }

            function constrainTranslation(nextX = translateX, nextY = translateY, nextScale = scale) {
                if (nextScale <= 1) {
                    return { x: 0, y: 0 };
                }

                const rect = getContainerRect();
                const displayed = getDisplayedImageSize();
                const scaledWidth = displayed.width * nextScale;
                const scaledHeight = displayed.height * nextScale;
                const limitX = Math.max(0, (scaledWidth - rect.width) / 2);
                const limitY = Math.max(0, (scaledHeight - rect.height) / 2);

                return {
                    x: clamp(nextX, -limitX, limitX),
                    y: clamp(nextY, -limitY, limitY)
                };
            }

            function applyTransform() {
                const constrained = constrainTranslation(translateX, translateY, scale);
                translateX = constrained.x;
                translateY = constrained.y;
                image.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scale})`;
                container.classList.toggle("is-zoomed", scale > 1);
                container.classList.toggle("is-dragging", isMouseDragging || gestureMode === "drag");
            }

            function setGestureActive(active) {
                document.body.classList.toggle("is-gesture-active", active);
            }

            function resetGestureState() {
                isMouseDragging = false;
                gestureMode = "none";
                dragPointerId = null;
                pinchStartDistance = 0;
                setGestureActive(false);
                applyTransform();
            }

            function resetView() {
                scale = 1;
                translateX = 0;
                translateY = 0;
                resetGestureState();
                applyTransform();
            }

            function commitScaleAt(clientX, clientY, nextScale) {
                const point = getPointFromClient(clientX, clientY);
                const prevScale = scale;
                const clampedScale = clamp(nextScale, MIN_SCALE, MAX_SCALE);

                if (clampedScale === prevScale) {
                    return;
                }

                scale = clampedScale;
                const ratio = scale / prevScale;
                const nextX = point.x - (point.x - translateX) * ratio;
                const nextY = point.y - (point.y - translateY) * ratio;
                const constrained = constrainTranslation(nextX, nextY, scale);
                translateX = constrained.x;
                translateY = constrained.y;
                applyTransform();
            }

            function getPointerData(event) {
                return {
                    pointerId: event.pointerId,
                    pointerType: event.pointerType,
                    clientX: event.clientX,
                    clientY: event.clientY
                };
            }

            function getTouchPointers() {
                return Array.from(activePointers.values()).filter((pointer) => pointer.pointerType === "touch");
            }

            function getPointerDistance(a, b) {
                return Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
            }

            function getPointerMidpoint(a, b) {
                return {
                    clientX: (a.clientX + b.clientX) / 2,
                    clientY: (a.clientY + b.clientY) / 2
                };
            }

            function beginPointerDrag(pointer) {
                gestureMode = scale > 1 ? "drag" : "none";
                dragPointerId = gestureMode === "drag" ? pointer.pointerId : null;
                isMouseDragging = pointer.pointerType === "mouse" && gestureMode === "drag";
                setGestureActive(gestureMode === "drag");
                applyTransform();
            }

            function beginTouchPinch(pointerA, pointerB) {
                const midpoint = getPointerMidpoint(pointerA, pointerB);
                const point = getPointFromClient(midpoint.clientX, midpoint.clientY);
                gestureMode = "pinch";
                dragPointerId = null;
                isMouseDragging = false;
                setGestureActive(true);
                pinchStartDistance = getPointerDistance(pointerA, pointerB);
                pinchStartScale = scale;
                pinchStartTranslateX = translateX;
                pinchStartTranslateY = translateY;
                pinchStartMidX = point.x;
                pinchStartMidY = point.y;
                applyTransform();
            }

            function updatePointerDrag(previousPointer, nextPointer) {
                if (gestureMode !== "drag" || scale <= 1) {
                    return;
                }

                const deltaX = nextPointer.clientX - previousPointer.clientX;
                const deltaY = nextPointer.clientY - previousPointer.clientY;
                const constrained = constrainTranslation(translateX + deltaX, translateY + deltaY, scale);
                translateX = constrained.x;
                translateY = constrained.y;
                applyTransform();
            }

            function updateTouchPinch(pointerA, pointerB) {
                if (gestureMode !== "pinch" || pinchStartDistance <= 0) {
                    return;
                }

                const midpoint = getPointerMidpoint(pointerA, pointerB);
                const point = getPointFromClient(midpoint.clientX, midpoint.clientY);
                const distance = getPointerDistance(pointerA, pointerB);
                const nextScale = clamp(pinchStartScale * (distance / pinchStartDistance), MIN_SCALE, MAX_SCALE);
                const scaleRatio = nextScale / pinchStartScale;
                const nextX = point.x - (pinchStartMidX - pinchStartTranslateX) * scaleRatio;
                const nextY = point.y - (pinchStartMidY - pinchStartTranslateY) * scaleRatio;
                const constrained = constrainTranslation(nextX, nextY, nextScale);

                scale = nextScale;
                translateX = constrained.x;
                translateY = constrained.y;
                applyTransform();
            }

            function applyViewportReflow() {
                pendingViewportReflow = false;
                const constrained = constrainTranslation(translateX, translateY, scale);
                translateX = constrained.x;
                translateY = constrained.y;
                applyTransform();
                showOverlay();
            }

            function scheduleViewportReflow() {
                pendingViewportReflow = true;
                clearTimeout(resizeTimer);

                resizeTimer = setTimeout(() => {
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            if (activePointers.size > 0) {
                                return;
                            }
                            applyViewportReflow();
                        });
                    });
                }, RESIZE_SETTLE_DELAY);
            }

            function syncTouchGestureFromPointers() {
                const touchPointers = getTouchPointers();

                if (touchPointers.length >= 2) {
                    beginTouchPinch(touchPointers[0], touchPointers[1]);
                    return;
                }

                if (touchPointers.length === 1) {
                    beginPointerDrag(touchPointers[0]);
                    return;
                }

                if (!isMouseDragging) {
                    gestureMode = "none";
                    dragPointerId = null;
                    pinchStartDistance = 0;
                    setGestureActive(false);
                    applyTransform();
                }

                if (pendingViewportReflow && activePointers.size === 0) {
                    applyViewportReflow();
                }
            }

            function showOverlay() {
                backButton.classList.add("is-visible");
                backButton.classList.remove("is-dimmed");
                metaPanel.classList.add("is-visible");
                metaPanel.classList.remove("is-dimmed");

                clearTimeout(hideTimer);
                hideTimer = setTimeout(() => {
                    backButton.classList.remove("is-visible");
                    backButton.classList.add("is-dimmed");
                    metaPanel.classList.remove("is-visible");
                    metaPanel.classList.add("is-dimmed");
                }, OVERLAY_HIDE_DELAY);
            }

            function setDownloadAvailable(available) {
                isDownloadAvailable = available;
                downloadButton.classList.toggle("is-available", available);
                downloadButton.classList.toggle("is-disabled", !available);
            }

            function detectDownloadAvailability() {
                const url = downloadButton?.dataset.downloadUrl;

                if (!downloadButton || !url) {
                    setDownloadAvailable(false);
                    return;
                }

                const probe = new Image();
                probe.onload = () => setDownloadAvailable(true);
                probe.onerror = () => setDownloadAvailable(false);
                probe.src = `${url}${url.includes("?") ? "&" : "?"}v=${Date.now()}`;
            }

            async function downloadCurrentImage() {
                if (!downloadButton || !isDownloadAvailable || isDownloading) {
                    return;
                }

                const url = downloadButton.dataset.downloadUrl;
                const filename = downloadButton.dataset.downloadFilename || "__ITEM_ID__.webp";

                if (!url) {
                    return;
                }

                isDownloading = true;
                downloadButton.classList.add("is-busy");
                showOverlay();

                try {
                    const response = await fetch(url, {
                        method: "GET",
                        mode: "cors",
                        credentials: "omit",
                        cache: "no-store",
                        redirect: "follow"
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const blob = await response.blob();
                    const objectUrl = URL.createObjectURL(blob);

                    try {
                        const link = document.createElement("a");
                        link.href = objectUrl;
                        link.download = filename;
                        link.rel = "noopener";
                        link.style.display = "none";
                        document.body.appendChild(link);
                        link.click();
                        link.remove();
                    } finally {
                        setTimeout(() => URL.revokeObjectURL(objectUrl), 1500);
                    }
                } catch (_) {
                } finally {
                    isDownloading = false;
                    downloadButton.classList.remove("is-busy");
                    showOverlay();
                }
            }

            container.addEventListener("wheel", (event) => {
                event.preventDefault();
                const delta = event.deltaY < 0 ? SCALE_STEP : -SCALE_STEP;
                commitScaleAt(event.clientX, event.clientY, scale + delta);
                showOverlay();
            }, { passive: false });

            window.addEventListener("keydown", (event) => {
                const key = event.key;
                if (key === "+" || key === "=") {
                    event.preventDefault();
                    commitScaleAt(window.innerWidth / 2, window.innerHeight / 2, scale + SCALE_STEP);
                } else if (key === "-") {
                    event.preventDefault();
                    commitScaleAt(window.innerWidth / 2, window.innerHeight / 2, scale - SCALE_STEP);
                } else if (key === "0") {
                    event.preventDefault();
                    resetView();
                } else if (key === "Escape") {
                    event.preventDefault();
                    try {
                        if (document.referrer && new URL(document.referrer).origin === location.origin) {
                            history.back();
                        } else {
                            window.location.href = "../../index.html";
                        }
                    } catch (_) {
                        window.location.href = "../../index.html";
                    }
                }

                showOverlay();
            });

            container.addEventListener("pointerdown", (event) => {
                const isMouseLikePointer = event.pointerType === "mouse" || event.pointerType === "pen";

                if (isMouseLikePointer && event.button !== 0) {
                    return;
                }

                if (event.pointerType === "touch") {
                    event.preventDefault();
                }

                const pointer = getPointerData(event);
                activePointers.set(pointer.pointerId, pointer);

                try {
                    container.setPointerCapture(event.pointerId);
                } catch (_) {
                }

                if (event.pointerType === "touch") {
                    syncTouchGestureFromPointers();
                } else {
                    if (scale <= 1) {
                        showOverlay();
                        return;
                    }
                    beginPointerDrag(pointer);
                }

                showOverlay();
            });

            container.addEventListener("pointermove", (event) => {
                const previousPointer = activePointers.get(event.pointerId);
                if (!previousPointer) {
                    return;
                }

                if (event.pointerType === "touch") {
                    event.preventDefault();
                }

                const nextPointer = getPointerData(event);
                activePointers.set(nextPointer.pointerId, nextPointer);

                if (nextPointer.pointerType === "touch") {
                    const touchPointers = getTouchPointers();

                    if (touchPointers.length >= 2) {
                        if (gestureMode !== "pinch") {
                            beginTouchPinch(touchPointers[0], touchPointers[1]);
                        }
                        updateTouchPinch(touchPointers[0], touchPointers[1]);
                        showOverlay();
                        return;
                    }

                    if (touchPointers.length === 1) {
                        if (gestureMode !== "drag" || dragPointerId !== nextPointer.pointerId) {
                            beginPointerDrag(nextPointer);
                        }
                        updatePointerDrag(previousPointer, nextPointer);
                        showOverlay();
                        return;
                    }

                    showOverlay();
                    return;
                }

                if (gestureMode === "drag" && dragPointerId === nextPointer.pointerId && scale > 1) {
                    updatePointerDrag(previousPointer, nextPointer);
                    showOverlay();
                }
            });

            function handlePointerEnd(event) {
                const pointer = activePointers.get(event.pointerId);
                if (!pointer) {
                    return;
                }

                activePointers.delete(event.pointerId);

                try {
                    container.releasePointerCapture(event.pointerId);
                } catch (_) {
                }

                if (pointer.pointerType === "touch") {
                    syncTouchGestureFromPointers();
                    showOverlay();
                    return;
                }

                if (dragPointerId === event.pointerId) {
                    isMouseDragging = false;
                    gestureMode = "none";
                    dragPointerId = null;
                    pinchStartDistance = 0;
                    setGestureActive(false);
                    applyTransform();
                }

                if (pendingViewportReflow && activePointers.size === 0) {
                    applyViewportReflow();
                }

                showOverlay();
            }

            container.addEventListener("pointerup", handlePointerEnd);
            container.addEventListener("pointercancel", handlePointerEnd);
            container.addEventListener("lostpointercapture", handlePointerEnd);

            container.addEventListener("dblclick", (event) => {
                if (scale > 1) {
                    resetView();
                } else {
                    commitScaleAt(event.clientX, event.clientY, 2);
                }
                showOverlay();
            });

            downloadButton?.addEventListener("click", async (event) => {
                event.preventDefault();
                event.stopPropagation();
                await downloadCurrentImage();
            });

            ["mousemove", "mousedown", "pointerdown", "touchstart", "click", "wheel"].forEach((eventName) => {
                window.addEventListener(eventName, showOverlay, { passive: true });
            });

            if (image.complete) {
                resetView();
            } else {
                image.addEventListener("load", resetView, { once: true });
            }

            window.addEventListener("resize", scheduleViewportReflow);

            detectDownloadAvailability();
            showOverlay();
        })();
    </script>
</body>

</html>
