<!DOCTYPE html>
<html lang="ja" style="background:#000;">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>__PAGE_TITLE__</title>
    <meta name="description" content="__META_DESCRIPTION__" />
    <link rel="canonical" href="https://pix.npaso.com/items/__ITEM_ID__/" />

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: Inter, "Noto Sans JP", system-ui, -apple-system, sans-serif;
        }

        body {
            overflow: hidden;
        }

        a,
        button {
            color: inherit;
            text-decoration: none;
            font: inherit;
        }

        .viewer-back {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 30;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 92px;
            height: 48px;
            padding: 0 16px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.02em;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.42);
            transition: opacity 0.28s ease, background-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
            opacity: 0;
            pointer-events: none;
        }

        .viewer-back.is-visible {
            opacity: 0.86;
            pointer-events: auto;
        }

        .viewer-back.is-dimmed {
            opacity: 0;
            pointer-events: none;
        }

        .viewer-back:hover {
            background: rgba(0, 0, 0, 0.84);
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5);
        }

        .viewer-stage {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            touch-action: none;
            user-select: none;
            cursor: default;
        }

        .viewer-stage.is-zoomed {
            cursor: grab;
        }

        .viewer-stage.is-dragging {
            cursor: grabbing;
        }

        .viewer-image {
            display: block;
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            transform-origin: center center;
            transform: translate3d(0px, 0px, 0) scale(1);
            will-change: transform;
            user-select: none;
            -webkit-user-drag: none;
        }

        .viewer-meta {
            position: fixed;
            left: 18px;
            right: 18px;
            bottom: 18px;
            z-index: 25;
            max-width: min(760px, calc(100vw - 36px));
            padding: 16px 18px;
            border-radius: 24px;
            background: transparent;
            border: 0;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            box-shadow: none;
            transition: opacity 0.28s ease, transform 0.28s ease;
            opacity: 0;
            pointer-events: none;
        }

        .viewer-meta.is-visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .viewer-meta.is-dimmed {
            opacity: 0;
            transform: translateY(4px);
            pointer-events: none;
        }

        .viewer-meta__title {
            margin: 0 0 8px;
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(0.92rem, 1.4vw, 1.02rem);
            font-weight: 500;
            line-height: 1.45;
            letter-spacing: 0.01em;
        }

        .viewer-meta__description {
            margin: 0;
            color: rgba(255, 255, 255, 0.84);
            font-size: 0.96rem;
            line-height: 1.65;
        }

        .viewer-meta__actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .viewer-download {
            display: none;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 0 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.87rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: background-color 0.18s ease, border-color 0.18s ease, transform 0.18s ease, opacity 0.18s ease;
            cursor: pointer;
        }

        .viewer-download.is-available {
            display: inline-flex;
        }

        .viewer-download:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.26);
            transform: translateY(-1px);
        }

        .viewer-download:active {
            transform: translateY(0);
        }

        .viewer-download.is-busy {
            opacity: 0.72;
            cursor: progress;
        }

        .viewer-download.is-disabled {
            opacity: 0.5;
            cursor: default;
        }

        .viewer-download-note {
            display: none;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .viewer-download-note.is-visible {
            display: block;
        }

        .viewer-meta__tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .viewer-meta__tag {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.88);
            font-size: 0.82rem;
        }

        @media (max-width: 640px) {
            .viewer-back {
                min-width: 70px;
                height: 42px;
                font-size: 14px;
            }

            .viewer-meta {
                left: 12px;
                right: 12px;
                bottom: 12px;
                padding: 14px 14px;
                border-radius: 20px;
            }

            .viewer-meta__description {
                font-size: 0.9rem;
            }

            .viewer-download {
                min-height: 36px;
                padding: 0 12px;
                font-size: 0.84rem;
            }

            .viewer-download-note {
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <a class="viewer-back" href="../../index.html" aria-label="一覧へ戻る">←</a>

    <main class="viewer-stage" id="viewerStage" aria-label="画像ビューア">
        <img class="viewer-image" id="viewerImage" src="__VIEWER_IMAGE_URL__" alt="__IMAGE_ALT__" loading="eager"
            draggable="false" />
    </main>

    <aside class="viewer-meta" id="viewerMeta" aria-label="作品情報">
        <h1 class="viewer-meta__title">__TITLE__</h1>
        <p class="viewer-meta__description">__DISPLAY_DESCRIPTION__</p>

        <div class="viewer-meta__actions">
            <button class="viewer-download" id="viewerDownload" type="button" data-download-url="__DOWNLOAD_IMAGE_URL__"
                data-download-filename="__ITEM_ID__.webp" aria-label="高解像度 Download">高解像度 Download</button>
        </div>

        <p class="viewer-download-note" id="viewerDownloadNote" aria-live="polite"></p>
    </aside>

    <script>
        (() => {
            const container = document.getElementById("viewerStage");
            const image = document.getElementById("viewerImage");
            const backButton = document.querySelector(".viewer-back");
            const metaPanel = document.getElementById("viewerMeta");
            const downloadButton = document.getElementById("viewerDownload");

            let scale = 1;
            let translateX = 0;
            let translateY = 0;

            const MIN_SCALE = 1;
            const MAX_SCALE = 6;
            const SCALE_STEP = 0.2;
            const OVERLAY_HIDE_DELAY = 2600;
            const RESIZE_SETTLE_DELAY = 180;

            let isDragging = false;
            let dragStartX = 0;
            let dragStartY = 0;
            let dragOriginX = 0;
            let dragOriginY = 0;

            const activePointers = new Map();
            let pinchStartDistance = 0;
            let pinchStartScale = 1;
            let pinchStartTranslateX = 0;
            let pinchStartTranslateY = 0;
            let pinchStartMidX = 0;
            let pinchStartMidY = 0;

            let hideTimer = null;
            let isDownloadAvailable = false;
            let isDownloading = false;
            let resizeTimer = null;
            let isViewportSettling = false;

            function clamp(value, min, max) {
                return Math.min(max, Math.max(min, value));
            }

            function getDisplayedImageSize() {
                const rect = container.getBoundingClientRect();
                const naturalWidth = image.naturalWidth || image.width || rect.width;
                const naturalHeight = image.naturalHeight || image.height || rect.height;

                if (!naturalWidth || !naturalHeight) {
                    return {
                        width: rect.width,
                        height: rect.height
                    };
                }

                const imageRatio = naturalWidth / naturalHeight;
                const containerRatio = rect.width / rect.height;

                if (imageRatio > containerRatio) {
                    return {
                        width: rect.width,
                        height: rect.width / imageRatio
                    };
                }

                return {
                    width: rect.height * imageRatio,
                    height: rect.height
                };
            }

            function constrainTranslation(nextX = translateX, nextY = translateY, nextScale = scale) {
                if (nextScale <= 1) {
                    return { x: 0, y: 0 };
                }

                const rect = container.getBoundingClientRect();
                const displayed = getDisplayedImageSize();
                const scaledWidth = displayed.width * nextScale;
                const scaledHeight = displayed.height * nextScale;
                const limitX = Math.max(0, (scaledWidth - rect.width) / 2);
                const limitY = Math.max(0, (scaledHeight - rect.height) / 2);

                return {
                    x: clamp(nextX, -limitX, limitX),
                    y: clamp(nextY, -limitY, limitY)
                };
            }

            function applyTransform() {
                const constrained = constrainTranslation(translateX, translateY, scale);
                translateX = constrained.x;
                translateY = constrained.y;
                image.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scale})`;
                container.classList.toggle("is-zoomed", scale > 1);
                container.classList.toggle("is-dragging", isDragging);
            }

            function resetGestureState() {
                activePointers.clear();
                pinchStartDistance = 0;
                pinchStartScale = scale;
                pinchStartTranslateX = translateX;
                pinchStartTranslateY = translateY;
                pinchStartMidX = 0;
                pinchStartMidY = 0;
                isDragging = false;
                applyTransform();
            }

            function resetView() {
                scale = 1;
                translateX = 0;
                translateY = 0;
                resetGestureState();
                applyTransform();
            }

            function getPointFromClient(clientX, clientY) {
                const rect = container.getBoundingClientRect();
                return {
                    x: clientX - rect.left - rect.width / 2,
                    y: clientY - rect.top - rect.height / 2
                };
            }

            function zoomAt(clientX, clientY, nextScale) {
                const point = getPointFromClient(clientX, clientY);
                const prevScale = scale;
                const clampedScale = clamp(nextScale, MIN_SCALE, MAX_SCALE);

                if (clampedScale === prevScale) {
                    return;
                }

                scale = clampedScale;
                const ratio = scale / prevScale;
                translateX = point.x - (point.x - translateX) * ratio;
                translateY = point.y - (point.y - translateY) * ratio;

                if (scale === 1) {
                    translateX = 0;
                    translateY = 0;
                } else {
                    const constrained = constrainTranslation(translateX, translateY, scale);
                    translateX = constrained.x;
                    translateY = constrained.y;
                }

                applyTransform();
            }

            function getPointerPair() {
                return Array.from(activePointers.values()).slice(0, 2);
            }

            function getDistance(a, b) {
                return Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
            }

            function getMidpoint(a, b) {
                return {
                    clientX: (a.clientX + b.clientX) / 2,
                    clientY: (a.clientY + b.clientY) / 2
                };
            }

            function startPinchGesture() {
                const [first, second] = getPointerPair();

                if (!first || !second) {
                    return;
                }

                const midpoint = getMidpoint(first, second);
                const point = getPointFromClient(midpoint.clientX, midpoint.clientY);

                pinchStartDistance = getDistance(first, second);
                pinchStartScale = scale;
                pinchStartTranslateX = translateX;
                pinchStartTranslateY = translateY;
                pinchStartMidX = point.x;
                pinchStartMidY = point.y;
                isDragging = false;
                applyTransform();
            }

            function updatePinchGesture() {
                const [first, second] = getPointerPair();

                if (!first || !second || pinchStartDistance <= 0) {
                    return;
                }

                const midpoint = getMidpoint(first, second);
                const point = getPointFromClient(midpoint.clientX, midpoint.clientY);
                const distance = getDistance(first, second);
                const nextScale = clamp(pinchStartScale * (distance / pinchStartDistance), MIN_SCALE, MAX_SCALE);
                const scaleRatio = nextScale / pinchStartScale;

                scale = nextScale;
                translateX = point.x - (pinchStartMidX - pinchStartTranslateX) * scaleRatio;
                translateY = point.y - (pinchStartMidY - pinchStartTranslateY) * scaleRatio;

                if (scale === 1) {
                    translateX = 0;
                    translateY = 0;
                } else {
                    const constrained = constrainTranslation(translateX, translateY, scale);
                    translateX = constrained.x;
                    translateY = constrained.y;
                }

                applyTransform();
            }

            function scheduleViewportReset() {
                isViewportSettling = true;
                clearTimeout(resizeTimer);
                resetGestureState();

                resizeTimer = setTimeout(() => {
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            resetView();
                            isViewportSettling = false;
                            showOverlay();
                        });
                    });
                }, RESIZE_SETTLE_DELAY);
            }

            function showOverlay() {
                backButton.classList.add("is-visible");
                backButton.classList.remove("is-dimmed");
                metaPanel.classList.add("is-visible");
                metaPanel.classList.remove("is-dimmed");

                clearTimeout(hideTimer);
                hideTimer = setTimeout(() => {
                    backButton.classList.remove("is-visible");
                    backButton.classList.add("is-dimmed");
                    metaPanel.classList.remove("is-visible");
                    metaPanel.classList.add("is-dimmed");
                }, OVERLAY_HIDE_DELAY);
            }

            function showNote(_) {
            }

            function setDownloadAvailable(available) {
                isDownloadAvailable = available;
                downloadButton.classList.toggle("is-available", available);
                downloadButton.classList.toggle("is-disabled", !available);
            }

            function detectDownloadAvailability() {
                const url = downloadButton?.dataset.downloadUrl;

                if (!downloadButton || !url) {
                    setDownloadAvailable(false);
                    return;
                }

                const probe = new Image();

                probe.onload = () => {
                    setDownloadAvailable(true);
                };

                probe.onerror = () => {
                    setDownloadAvailable(false);
                };

                probe.src = `${url}${url.includes("?") ? "&" : "?"}v=${Date.now()}`;
            }

            async function downloadCurrentImage() {
                if (!downloadButton || !isDownloadAvailable || isDownloading) {
                    return;
                }

                const url = downloadButton.dataset.downloadUrl;
                const filename = downloadButton.dataset.downloadFilename || "__ITEM_ID__.webp";

                if (!url) {
                    return;
                }

                isDownloading = true;
                downloadButton.classList.add("is-busy");
                showOverlay();

                try {
                    const response = await fetch(url, {
                        method: "GET",
                        mode: "cors",
                        credentials: "omit",
                        cache: "no-store",
                        redirect: "follow"
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const blob = await response.blob();
                    const objectUrl = URL.createObjectURL(blob);

                    try {
                        const link = document.createElement("a");
                        link.href = objectUrl;
                        link.download = filename;
                        link.rel = "noopener";
                        link.style.display = "none";
                        document.body.appendChild(link);
                        link.click();
                        link.remove();
                    } finally {
                        setTimeout(() => {
                            URL.revokeObjectURL(objectUrl);
                        }, 1500);
                    }
                } catch (_) {
                } finally {
                    isDownloading = false;
                    downloadButton.classList.remove("is-busy");
                    showOverlay();
                }
            }

            container.addEventListener("wheel", (event) => {
                if (isViewportSettling) {
                    return;
                }

                event.preventDefault();
                const delta = event.deltaY < 0 ? SCALE_STEP : -SCALE_STEP;
                zoomAt(event.clientX, event.clientY, scale + delta);
                showOverlay();
            }, { passive: false });

            window.addEventListener("keydown", (event) => {
                if (isViewportSettling) {
                    return;
                }

                const key = event.key;

                if (key === "+" || key === "=") {
                    event.preventDefault();
                    zoomAt(window.innerWidth / 2, window.innerHeight / 2, scale + SCALE_STEP);
                } else if (key === "-") {
                    event.preventDefault();
                    zoomAt(window.innerWidth / 2, window.innerHeight / 2, scale - SCALE_STEP);
                } else if (key === "0") {
                    event.preventDefault();
                    resetView();
                } else if (key === "Escape") {
                    event.preventDefault();
                    try {
                        if (document.referrer && new URL(document.referrer).origin === location.origin) {
                            history.back();
                        } else {
                            window.location.href = "../../index.html";
                        }
                    } catch (_) {
                        window.location.href = "../../index.html";
                    }
                }

                showOverlay();
            });

            container.addEventListener("pointerdown", (event) => {
                if (isViewportSettling) {
                    return;
                }

                activePointers.set(event.pointerId, {
                    clientX: event.clientX,
                    clientY: event.clientY
                });

                try {
                    container.setPointerCapture(event.pointerId);
                } catch (_) {
                }

                if (activePointers.size === 1) {
                    if (scale > 1) {
                        isDragging = true;
                        dragStartX = event.clientX;
                        dragStartY = event.clientY;
                        dragOriginX = translateX;
                        dragOriginY = translateY;
                        applyTransform();
                    }
                } else if (activePointers.size === 2) {
                    startPinchGesture();
                }

                showOverlay();
            });

            container.addEventListener("pointermove", (event) => {
                if (isViewportSettling || !activePointers.has(event.pointerId)) {
                    return;
                }

                activePointers.set(event.pointerId, {
                    clientX: event.clientX,
                    clientY: event.clientY
                });

                if (activePointers.size >= 2) {
                    updatePinchGesture();
                    showOverlay();
                    return;
                }

                if (!isDragging || scale <= 1) {
                    return;
                }

                const nextX = dragOriginX + (event.clientX - dragStartX);
                const nextY = dragOriginY + (event.clientY - dragStartY);
                const constrained = constrainTranslation(nextX, nextY, scale);
                translateX = constrained.x;
                translateY = constrained.y;
                applyTransform();
                showOverlay();
            });

            function endPointer(event) {
                activePointers.delete(event.pointerId);

                try {
                    container.releasePointerCapture(event.pointerId);
                } catch (_) {
                }

                if (isViewportSettling) {
                    resetGestureState();
                    showOverlay();
                    return;
                }

                if (activePointers.size >= 2) {
                    startPinchGesture();
                } else if (activePointers.size === 1) {
                    const [remainingPointer] = getPointerPair();
                    if (remainingPointer && scale > 1) {
                        isDragging = true;
                        dragStartX = remainingPointer.clientX;
                        dragStartY = remainingPointer.clientY;
                        dragOriginX = translateX;
                        dragOriginY = translateY;
                    } else {
                        isDragging = false;
                    }
                } else {
                    isDragging = false;
                }

                applyTransform();
                showOverlay();
            }

            container.addEventListener("pointerup", endPointer);
            container.addEventListener("pointercancel", endPointer);
            container.addEventListener("pointerleave", (event) => {
                if (!activePointers.has(event.pointerId)) {
                    return;
                }

                const relatedTarget = event.relatedTarget;
                if (relatedTarget && container.contains(relatedTarget)) {
                    return;
                }

                endPointer(event);
            });

            container.addEventListener("dblclick", (event) => {
                if (isViewportSettling) {
                    return;
                }

                if (scale > 1) {
                    resetView();
                } else {
                    zoomAt(event.clientX, event.clientY, 2);
                }
                showOverlay();
            });

            downloadButton?.addEventListener("click", async (event) => {
                event.preventDefault();
                event.stopPropagation();
                await downloadCurrentImage();
            });

            [
                "mousemove",
                "mousedown",
                "touchstart",
                "pointermove",
                "pointerdown",
                "click",
                "wheel"
            ].forEach((eventName) => {
                window.addEventListener(eventName, showOverlay, { passive: true });
            });

            document.addEventListener("visibilitychange", () => {
                if (document.visibilityState === "visible") {
                    scheduleViewportReset();
                }
            });

            if (image.complete) {
                resetView();
            } else {
                image.addEventListener("load", resetView, { once: true });
            }

            window.addEventListener("resize", scheduleViewportReset);
            window.addEventListener("orientationchange", scheduleViewportReset);
            window.visualViewport?.addEventListener("resize", scheduleViewportReset);

            detectDownloadAvailability();
            showOverlay();
        })();
    </script>
</body>

</html>
